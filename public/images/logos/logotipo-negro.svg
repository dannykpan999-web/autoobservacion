<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 44" fill="none">
  <!-- Icon mark: 3 concentric circles = looking inward -->
  <circle cx="22" cy="22" r="19.5" stroke="#1a1a1a" stroke-width="1.3" fill="none"/>
  <circle cx="22" cy="22" r="11.5" stroke="#c6b8e8" stroke-width="1.3" fill="none"/>
  <circle cx="22" cy="22" r="4"    fill="#1a1a1a"/>
  <!-- Vertical divider line -->
  <line x1="52" y1="8" x2="52" y2="36" stroke="#d1baaa" stroke-width="1"/>
  <!-- Wordmark top: AUTO spaced out -->
  <text x="62" y="17"
    font-family="'Playfair Display', Georgia, serif"
    font-size="10"
    font-weight="400"
    letter-spacing="5"
    fill="#1a1a1a">AUTO</text>
  <!-- Wordmark bottom: observación® larger weight -->
  <text x="62" y="33"
    font-family="'Playfair Display', Georgia, serif"
    font-size="13.5"
    font-weight="600"
    letter-spacing="0.5"
    fill="#1a1a1a">observación<tspan font-size="9" baseline-shift="super">®</tspan></text>
</svg>
